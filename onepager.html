<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kodnyx – Electrical Architecture Optimisation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --teal:        #0E4C52;
      --teal-light:  #5FB7B0;
      --teal-bright: #7DD4CD;
      --white:       #FFFFFF;
      --font:        'Plus Jakarta Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HERO WRAPPER ───────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 640px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('DSC03355.jpg');
      background-size: cover;
      background-position: center 30%;
      animation: slowZoom 20s ease-in-out infinite alternate;
    }

    @keyframes slowZoom {
      from { transform: scale(1); }
      to   { transform: scale(1.06); }
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        rgba(14,76,82,0.94) 0%,
        rgba(14,76,82,0.84) 55%,
        rgba(14,76,82,0.58) 100%
      );
    }

    /* ─── TOP BAR: logo, in normal flow above content ─────────── */
    .hero-topbar {
      position: relative;
      z-index: 4;
      padding: 3vh 5vw 0;
      flex-shrink: 0;
      opacity: 0;
      animation: fadeIn 0.7s 0.1s forwards;
    }

    .hero-topbar img {
      height: clamp(32px, 3.8vh, 52px);
      width: auto;
      display: block;
    }

    /* ─── MAIN BODY: fills remaining space ────────────────────── */
    .hero-body {
      position: relative;
      z-index: 4;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2vh 5vw 2vh;
      gap: 4vw;
      min-width: 0;
    }

    /* ─── LEFT: text content ──────────────────────────────────── */
    .hero-content {
      flex: 1;
      min-width: 0;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: clamp(0.85rem, 1.2vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9EEAE3;
      margin-bottom: 2.5vh;
      border-left: 4px solid #9EEAE3;
      padding-left: 14px;
      opacity: 0;
      animation: fadeUp 0.7s 0.25s forwards;
    }

    .hero h1 {
      font-size: clamp(2.6rem, 5.6vw, 5rem);
      font-weight: 800;
      line-height: 1.06;
      color: #FFFFFF;
      letter-spacing: -0.03em;
      margin-bottom: 3vh;
      opacity: 0;
      animation: fadeUp 0.7s 0.4s forwards;
      text-shadow: 0 2px 24px rgba(0,0,0,0.3);
    }

    .hero h1 em {
      font-style: normal;
      color: #9EEAE3;
      display: block;
    }

    .hero-sub {
      font-size: clamp(1.1rem, 1.9vw, 1.5rem);
      font-weight: 500;
      line-height: 1.6;
      color: rgba(255,255,255,1);
      margin-bottom: 1.8vh;
      opacity: 0;
      animation: fadeUp 0.7s 0.55s forwards;
      text-shadow: 0 1px 12px rgba(0,0,0,0.25);
    }

    .hero-sub2 {
      font-size: clamp(1rem, 1.6vw, 1.35rem);
      font-weight: 700;
      color: #9EEAE3;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadeUp 0.7s 0.68s forwards;
    }

    /* ─── RIGHT: QR code ──────────────────────────────────────── */
    .hero-qr {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.7s 0.8s forwards;
    }

    .qr-frame {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(95,183,176,0.28);
      border-radius: 14px;
      padding: 16px 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .qr-frame img {
      width: clamp(90px, 10vw, 150px);
      height: auto;
      display: block;
    }

    .qr-label {
      font-size: clamp(0.65rem, 0.8vw, 0.82rem);
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-align: center;
    }

    /* ─── BOTTOM BAR ──────────────────────────────────────────── */
    .hero-bottom-bar {
      position: relative;
      z-index: 4;
      background: rgba(8, 46, 51, 0.95);
      border-top: 2px solid rgba(95,183,176,0.35);
      padding: 1.4vh 5vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      opacity: 0;
      animation: fadeIn 0.8s 1s forwards;
    }

    .bottom-left {
      font-size: clamp(0.85rem, 1.2vw, 1.1rem);
      font-weight: 600;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.02em;
    }

    .bottom-right {
      font-size: clamp(0.85rem, 1.2vw, 1.1rem);
      font-weight: 700;
      color: var(--teal-bright);
      letter-spacing: 0.04em;
    }

    /* ─── ANIMATIONS ──────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>

    <!-- Logo: sits in normal document flow, nothing overlaps it -->
    <div class="hero-topbar">
      <img src="kodnyx_white_teal.png" alt="Kodnyx" />
    </div>

    <!-- Main body: text left, QR right -->
    <div class="hero-body">

      <div class="hero-content">
        <span class="hero-eyebrow">Electrical Architecture Optimisation</span>

        <h1>Save up to <em>35% on electricity costs.</em></h1>

        <p class="hero-sub">AC/DC architecture optimisation for industrial and commercial facilities and data centres.</p>

        <p class="hero-sub2">Enhance PV &amp; Battery Storage performance</p>
      </div>

      <div class="hero-qr">
        <div class="qr-frame">
          <img src="kodnyx_com_qr_transparent.png" alt="Visit kodnyx.com" />
          <div class="qr-label">Scan to learn more</div>
        </div>
      </div>

    </div>

    <!-- Bottom bar -->
    <div class="hero-bottom-bar">
      <div class="bottom-left">Redesigning How Electricity Flows.</div>
      <div class="bottom-right">kodnyx.com</div>
    </div>
  </section>

</body>
</html>
